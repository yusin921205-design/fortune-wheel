<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>宇宙行動建議</title>

<style>

body{
  font-family:Arial;
  text-align:center;
  background:#fff7fb;
  padding:40px;
}

.container{
  width:320px;
  height:320px;
  margin:40px auto;
  position:relative;
}

.wheel{
  width:100%;
  height:100%;
  border-radius:50%;
  position:absolute;
  transition:transform 4s cubic-bezier(.2,.8,.2,1);

  background: conic-gradient(
    #ffe0ec 0% 14.28%,
    #ffd6e7 14.28% 28.56%,
    #ffe9b3 28.56% 42.84%,
    #d6f5d6 42.84% 57.12%,
    #d6e6ff 57.12% 71.4%,
    #ffd1d1 71.4% 85.68%,
    #e0e0ff 85.68% 100%
  );
}

/* 數字 */
.num{
  position:absolute;
  font-size:22px;
  font-weight:bold;
  color:#333;
  transform: translate(-50%,-50%);
}

/* ⭐ 指針（已固定圓心） */
.pointer{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  z-index:999;
  pointer-events:none;
}

/* 圓心點 */
.pointer::before{
  content:"";
  position:absolute;
  width:16px;
  height:16px;
  background:#ff4f8b;
  border-radius:50%;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
}

/* 指針 */
.pointer::after{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-130%);
  width:0;
  height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-bottom:25px solid #ff4f8b;
}

button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#ff4f8b;
  color:white;
  font-size:16px;
}

.result{
  margin-top:20px;
  font-size:20px;
}

</style>
</head>

<body>

<h1>🌌 宇宙行動建議</h1>

<div class="container">
  <div class="wheel" id="wheel"></div>
  <div class="pointer"></div>
</div>

<button onclick="spin()">想好問題後　按此按鈕來接收訊號</button>

<div class="result" id="result"></div>

<script>

/* 宇宙行動建議內容 */
const messages = {
1:"先不要急著下結論",
2:"今天適合觀察",
3:"有些事晚一點會更清楚",
4:"留一點空間給變化",
5:"不需要現在做決定",
6:"有些答案會在你放鬆時浮現",
7:"現在的停頓其實在整理方向"
};

const wheel = document.getElementById("wheel");

let size = 7;
let angle = 360 / size;

const radius = 95;

/* 建立數字 */
for(let i = 0; i < size; i++){

  let deg = i * angle + angle / 2;
  let rad = deg * Math.PI / 180;

  let x = 160 + Math.cos(rad) * radius;
  let y = 160 + Math.sin(rad) * radius;

  let num = document.createElement("div");
  num.className = "num";
  num.innerText = i + 1;

  num.style.left = x + "px";
  num.style.top = y + "px";

  wheel.appendChild(num);
}

let rotation = 0;
let spinning = false;

function spin(){

if(spinning) return;
spinning = true;

/* 隨機結果 */
let resultIndex = Math.floor(Math.random()*7) + 1;

/* 轉動 */
rotation += 1800 + (resultIndex-1) * angle;

wheel.style.transform = `rotate(${rotation}deg)`;

setTimeout(()=>{

document.getElementById("result").innerText =
messages[resultIndex];

spinning = false;

},4000);

}

</script>

</body>
</html>
