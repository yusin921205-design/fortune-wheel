<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>運勢轉盤 PRO</title>

<style>

body{
  font-family:Arial;
  text-align:center;
  background:#fff7fb;
  padding:40px;
}

h1{
  color:#ff4f8b;
}

.container{
  position:relative;
  width:320px;
  height:320px;
  margin:40px auto;
}

.wheel{
  width:100%;
  height:100%;
  border-radius:50%;
  position:absolute;
  transition:transform 4s cubic-bezier(.17,.67,.12,.99);
}

.segment{
  position:absolute;
  width:100%;
  height:100%;
  clip-path: polygon(50% 50%, 100% 0, 100% 100%);
  transform-origin:center;
}

.label{
  position:absolute;
  left:50%;
  top:50%;
  font-size:14px;
  font-weight:bold;
  transform-origin:0 0;
}

.pointer{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}

.pointer:before{
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  background:#ff4f8b;
  border-radius:50%;
  transform:translate(-50%,-50%);
}

.pointer:after{
  content:"";
  position:absolute;
  left:-10px;
  top:-120px;
  width:0;
  height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-bottom:25px solid #ff4f8b;
}

button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#ff4f8b;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.result{
  margin-top:20px;
  font-size:22px;
}

</style>
</head>

<body>

<h1>🎰 運勢轉盤 PRO</h1>

<div class="container">

  <div class="wheel" id="wheel"></div>
  <div class="pointer"></div>

</div>

<button onclick="spin()">開始轉運 🍀</button>

<div class="result" id="result">點擊開始</div>

<script>

const results = [
"🌟 上上籤",
"✨ 上籤",
"🍀 吉",
"🌿 小吉",
"🌤 平",
"🌧 小凶",
"⚡ 凶"
];

const colors = [
"#ffe0ec",
"#ffd6e7",
"#ffe9b3",
"#d6f5d6",
"#d6e6ff",
"#ffd1d1",
"#e0e0ff"
];

const wheel = document.getElementById("wheel");

let size = results.length;
let angle = 360 / size;
let rotation = 0;
let spinning = false;

/* 建立轉盤 */
function buildWheel(){

for(let i=0;i<size;i++){

let seg = document.createElement("div");
seg.className = "segment";

seg.style.transform = `rotate(${i * angle}deg)`;
seg.style.background = colors[i];

let label = document.createElement("div");
label.className = "label";

label.style.transform =
`rotate(${i * angle + angle/2}deg) translate(110px,0px)`;

label.innerText = results[i];

seg.appendChild(label);
wheel.appendChild(seg);

}

}

buildWheel();

/* ⭐ FINAL：不再用猜角度，改用「整格對齊」 */
function spin(){

if(spinning) return;
spinning = true;

let index = Math.floor(Math.random() * size);

/* 👉 直接讓第 index 格對準 pointer */
let baseRotation = rotation % 360;

/* 每格角度 */
let slice = 360 / size;

/* ⭐ 算「要轉到哪個角度剛好停在中間」 */
let targetRotation =
360 * 5 +
(index * slice);

/* 扣掉目前角度，讓它對齊 */
rotation = targetRotation;

wheel.style.transform = `rotate(${-rotation}deg)`;

setTimeout(()=>{

document.getElementById("result").innerText =
"今日運勢：" + results[index];

spinning = false;

},4000);

}

</script>

</body>
</html>
