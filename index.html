<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>運勢轉盤 PRO</title>

<style>

body{
  font-family:Arial;
  text-align:center;
  background:#fff7fb;
  padding:40px;
}

h1{
  color:#ff4f8b;
}

.container{
  position:relative;
  width:320px;
  height:320px;
  margin:40px auto;
}

.wheel{
  width:100%;
  height:100%;
  border-radius:50%;
  position:absolute;
  transition:transform 4s cubic-bezier(.2,.8,.2,1);
  background: conic-gradient(
    #ffe0ec 0deg 51deg,
    #ffd6e7 51deg 102deg,
    #ffe9b3 102deg 153deg,
    #d6f5d6 153deg 204deg,
    #d6e6ff 204deg 255deg,
    #ffd1d1 255deg 306deg,
    #e0e0ff 306deg 360deg
  );
}

.pointer{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
}

.pointer::before{
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  background:#ff4f8b;
  border-radius:50%;
  transform:translate(-50%,-50%);
}

.pointer::after{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-100px);
  width:0;
  height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-bottom:25px solid #ff4f8b;
}

button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#ff4f8b;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.result{
  margin-top:20px;
  font-size:22px;
}

</style>
</head>

<body>

<h1>🎰 運勢轉盤 PRO</h1>

<div class="container">
  <div class="wheel" id="wheel"></div>
  <div class="pointer"></div>
</div>

<button onclick="spin()">開始轉運 🍀</button>

<div class="result" id="result">點擊開始</div>

<script>

const results = [
"🌟 上上籤",
"✨ 上籤",
"🍀 吉",
"🌿 小吉",
"🌤 平",
"🌧 小凶",
"⚡ 凶"
];

const wheel = document.getElementById("wheel");

let size = results.length;
let angle = 360 / size;

/* ⚠️ 累加旋轉 */
let rotation = 0;
let spinning = false;

/* 轉盤停止時的角度 -> 反推 index */
function getIndexFromRotation(rot){

let normalized = (rot % 360 + 360) % 360;

/* 指針在正上方，所以要反向 */
let adjusted = (360 - normalized + angle/2) % 360;

return Math.floor(adjusted / angle);

}

/* 轉動 */
function spin(){

if(spinning) return;
spinning = true;

/* 隨機停止角度 */
let spins = 5 * 360;
let randomAngle = Math.floor(Math.random() * 360);

rotation += spins + randomAngle;

wheel.style.transform = `rotate(${rotation}deg)`;

/* 用「畫面結果」決定顯示 */
setTimeout(()=>{

let index = getIndexFromRotation(rotation);

document.getElementById("result").innerText =
"今日運勢：" + results[index];

spinning = false;

},4000);

}

</script>

</body>
</html>
