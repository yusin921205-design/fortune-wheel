<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>今日運勢轉盤</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#fff7fb;
  padding:40px;
}

h1{
  color:#ff4f8b;
}

.container{
  position:relative;
  width:320px;
  height:320px;
  margin:40px auto;
}

/* 轉盤 */
.wheel{
  width:320px;
  height:320px;
  border-radius:50%;
  background:conic-gradient(
    #ffe0ec 0deg 51deg,
    #ffd6e7 51deg 102deg,
    #ffe9b3 102deg 153deg,
    #d6f5d6 153deg 204deg,
    #d6e6ff 204deg 255deg,
    #ffd1d1 255deg 306deg,
    #e0e0ff 306deg 360deg
  );
  position:absolute;
  top:0;
  left:0;
  transition: transform 3s ease;
  z-index:1;
}

/* 文字層 */
.labels{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:2;
  pointer-events:none;
}

.label{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  font-size:13px;
  font-weight:bold;
  color:#333;
}

/* 指針（固定正中心） */
.pointer{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%, -50%);
  z-index:10;
}

.pointer::before{
  content:"";
  width:18px;
  height:18px;
  background:#ff4f8b;
  border-radius:50%;
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%, -50%);
}

.pointer::after{
  content:"";
  position:absolute;
  left:50%;
  top:-140px;
  transform:translateX(-50%);

  width:0;
  height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-bottom:20px solid #ff4f8b;
}

/* 按鈕 */
button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#ff4f8b;
  color:white;
  font-size:16px;
  cursor:pointer;
  position:relative;
  z-index:20;
}

.result{
  margin-top:20px;
  font-size:22px;
}
</style>
</head>

<body>

<h1>🎰 今日運勢轉盤</h1>

<div class="container">

  <div class="wheel" id="wheel"></div>
  <div class="labels" id="labels"></div>
  <div class="pointer"></div>

</div>

<button onclick="spin()">開始轉運 🍀</button>

<div class="result" id="result">點擊開始</div>

<script>

const results = [
"🌟 上上籤",
"✨ 上籤",
"🍀 吉",
"🌿 小吉",
"🌤 平",
"🌧 小凶",
"⚡ 凶"
];

const wheel = document.getElementById("wheel");
const labels = document.getElementById("labels");

const angle = 360 / results.length;

/* ⭐ 正確放字（穩定版） */
results.forEach((text, i) => {

let div = document.createElement("div");
div.className = "label";

div.style.transform =
"rotate(" + (i * angle + angle/2) + "deg) translateY(-120px)";

div.innerHTML = text;

labels.appendChild(div);

});

let rotation = 0;
let spinning = false;
let currentIndex = 0;

function spin(){

if(spinning) return;
spinning = true;

currentIndex = Math.floor(Math.random() * results.length);

let slice = 360 / results.length;
let target = 360 * 3 - (currentIndex * slice + slice/2);

rotation += target;

wheel.style.transform = "rotate(" + rotation + "deg)";

setTimeout(() => {

document.getElementById("result").innerHTML =
"今日運勢：" + results[currentIndex];

spinning = false;

}, 3000);

}

</script>

</body>
</html>
