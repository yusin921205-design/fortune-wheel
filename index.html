<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>今日運勢轉盤</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#fff7fb;
  padding:40px;
}

h1{
  color:#ff4f8b;
}

.wheel{
  width:260px;
  height:260px;
  border-radius:50%;
  margin:40px auto;
  position:relative;
  border:8px solid #ff4f8b;
  transition: transform 3s cubic-bezier(.2,.8,.2,1);
  overflow:hidden;
}

.segment{
  position:absolute;
  width:50%;
  height:50%;
  left:50%;
  top:50%;
  transform-origin:0% 0%;
  font-size:14px;
  color:#333;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#ff4f8b;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.result{
  margin-top:20px;
  font-size:22px;
}
</style>
</head>

<body>

<h1>🎰 今日運勢轉盤</h1>

<div class="wheel" id="wheel"></div>

<button onclick="spin()">開始轉運 🍀</button>

<div class="result" id="result"></div>

<script>

const results = [
"🌟 上上籤",
"✨ 上籤",
"🍀 吉",
"🌿 小吉",
"🌤 平",
"🌧 小凶",
"⚡ 凶"
];

// 畫轉盤
const wheel = document.getElementById("wheel");

let angleStep = 360 / results.length;

results.forEach((text, i) => {
  let div = document.createElement("div");
  div.className = "segment";
  div.innerHTML = text;
  div.style.transform = `rotate(${i * angleStep}deg) translate(0,-120px)`;
  wheel.appendChild(div);
});

let spinning = false;

function spin(){

if(spinning) return;
spinning = true;

let deg = 360 * (3 + Math.random() * 3);

wheel.style.transform = "rotate(" + deg + "deg)";

setTimeout(() => {

let r = Math.floor(Math.random() * results.length);

document.getElementById("result").innerHTML =
"今日運勢：" + results[r];

spinning = false;

}, 3000);

}

</script>

</body>
</html>
