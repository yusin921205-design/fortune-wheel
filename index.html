<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>今日運勢轉盤</title>

<style>

body{
  font-family:Arial;
  text-align:center;
  background:#fff7fb;
  padding:40px;
}

h1{
  color:#ff4f8b;
}

.container{
  position:relative;
  width:320px;
  height:320px;
  margin:40px auto;
}

/* 轉盤（回到你原本 conic-gradient） */
.wheel{
  width:320px;
  height:320px;
  border-radius:50%;

  background:conic-gradient(
    #ffe0ec 0deg 51deg,
    #ffd6e7 51deg 102deg,
    #ffe9b3 102deg 153deg,
    #d6f5d6 153deg 204deg,
    #d6e6ff 204deg 255deg,
    #ffd1d1 255deg 306deg,
    #e0e0ff 306deg 360deg
  );

  position:absolute;
  left:0;
  top:0;

  transition:transform 3s cubic-bezier(.2,.8,.2,1);
}

/* 文字（保持你原本穩定版本） */
.text{
  position:absolute;
  width:100%;
  height:100%;
}

.text span{
  position:absolute;
  width:90px;
  text-align:center;
}

/* ⭐ 修正：只動指針（不動其他） */
.pointer{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}

.pointer:before{
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  background:#ff4f8b;
  border-radius:50%;
  left:0;
  top:0;
  transform:translate(-50%,-50%);
}

/* ⭐ 關鍵修正：箭頭「貼圓心」 */
.pointer:after{
  content:"";
  position:absolute;

  left:-12px;
  top:-25px; /* ← 這個是穩定值（不要再動了） */

  width:0;
  height:0;

  border-left:12px solid transparent;
  border-right:12px solid transparent;
  border-bottom:30px solid #ff4f8b;
}

/* 按鈕 */
button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#ff4f8b;
  color:white;
  font-size:16px;
}

.result{
  margin-top:20px;
  font-size:22px;
}

</style>
</head>

<body>

<h1>🎰 今日運勢轉盤</h1>

<div class="container">

  <div class="wheel" id="wheel">

    <div class="text">
      <span style="transform:rotate(25deg) translateY(-120px)">🌟 上上籤</span>
      <span style="transform:rotate(76deg) translateY(-120px)">✨ 上籤</span>
      <span style="transform:rotate(128deg) translateY(-120px)">🍀 吉</span>
      <span style="transform:rotate(180deg) translateY(-120px)">🌿 小吉</span>
      <span style="transform:rotate(231deg) translateY(-120px)">🌤 平</span>
      <span style="transform:rotate(282deg) translateY(-120px)">🌧 小凶</span>
      <span style="transform:rotate(334deg) translateY(-120px)">⚡ 凶</span>
    </div>

  </div>

  <div class="pointer"></div>

</div>

<button onclick="spin()">開始轉運 🍀</button>

<div class="result" id="result">點擊開始</div>

<script>

const results=[
"🌟 上上籤",
"✨ 上籤",
"🍀 吉",
"🌿 小吉",
"🌤 平",
"🌧 小凶",
"⚡ 凶"
];

let wheel=document.getElementById("wheel");
let rotation=0;
let spinning=false;

function spin(){

if(spinning) return;
spinning=true;

let index=Math.floor(Math.random()*results.length);

let slice=360/results.length;

/* ⭐ 最穩對齊公式 */
let target =
360*5
- (index*slice + slice/2)
- 90;

rotation += target;

wheel.style.transform = "rotate(" + rotation + "deg)";

setTimeout(()=>{

document.getElementById("result").innerText =
"今日運勢："+results[index];

spinning=false;

},3000);

}

</script>

</body>
</html>
