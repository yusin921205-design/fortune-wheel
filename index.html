<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>今日運勢轉盤</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#fff7fb;
  padding:40px;
}

h1{
  color:#ff4f8b;
}

/* 轉盤 */
.wheel{
  width:280px;
  height:280px;
  border-radius:50%;
  margin:40px auto;
  position:relative;
  border:6px solid #ff4f8b;
  overflow:hidden;
  transition: transform 3s cubic-bezier(.2,.8,.2,1);
}

/* 每一格 */
.slice{
  position:absolute;
  width:50%;
  height:50%;
  left:50%;
  top:50%;
  transform-origin:0% 0%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:bold;
}

/* 按鈕 */
button{
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#ff4f8b;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.result{
  margin-top:20px;
  font-size:22px;
}
</style>
</head>

<body>

<h1>🎰 今日運勢轉盤</h1>

<div class="wheel" id="wheel"></div>

<button onclick="spin()">開始轉運 🍀</button>

<div class="result" id="result"></div>

<script>

const results = [
"🌟 上上籤",
"✨ 上籤",
"🍀 吉",
"🌿 小吉",
"🌤 平",
"🌧 小凶",
"⚡ 凶"
];

const colors = [
"#ffe0ec",
"#ffd6e7",
"#ffe9b3",
"#d6f5d6",
"#d6e6ff",
"#ffd1d1",
"#e0e0ff"
];

let wheel = document.getElementById("wheel");

let angle = 360 / results.length;

// 畫真正分區
results.forEach((text, i) => {

let slice = document.createElement("div");
slice.className = "slice";

slice.innerHTML = text;
slice.style.background = colors[i];

// 扇形排列
slice.style.transform = `
rotate(${i * angle}deg)
skewY(-${90 - angle}deg)
translate(-50%, -50%)
`;

wheel.appendChild(slice);

});

let spinning = false;

function spin(){

if(spinning) return;
spinning = true;

// 隨機轉動
let deg = 360 * (3 + Math.random() * 3);

wheel.style.transform = "rotate(" + deg + "deg)";

setTimeout(() => {

let r = Math.floor(Math.random() * results.length);

document.getElementById("result").innerHTML =
"今日運勢：" + results[r];

spinning = false;

}, 3000);

}

</script>

</body>
</html>
