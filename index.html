<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>今日運勢轉盤</title>

<style>

body{
  font-family:Arial;
  text-align:center;
  background:#fff7fb;
  padding:40px;
}

h1{
  color:#ff4f8b;
}

.container{
  position:relative;
  width:320px;
  height:320px;
  margin:40px auto;
}

/* 轉盤 */
.wheel{
  width:320px;
  height:320px;
  border-radius:50%;
  position:absolute;
  left:0;
  top:0;
  transition:transform 4s cubic-bezier(.17,.67,.12,.99);
}

/* 指針（固定12點方向） */
.pointer{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}

.pointer:before{
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  background:#ff4f8b;
  border-radius:50%;
  transform:translate(-50%,-50%);
}

.pointer:after{
  content:"";
  position:absolute;
  left:-10px;
  top:-130px;
  width:0;
  height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-bottom:25px solid #ff4f8b;
}

/* 按鈕 */
button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#ff4f8b;
  color:white;
  font-size:16px;
}

.result{
  margin-top:20px;
  font-size:22px;
}

</style>
</head>

<body>

<h1>🎰 今日運勢轉盤</h1>

<div class="container">

  <div class="wheel" id="wheel"></div>
  <div class="pointer"></div>

</div>

<button onclick="spin()">開始轉運 🍀</button>

<div class="result" id="result">點擊開始</div>

<script>

const results=[
"🌟 上上籤",
"✨ 上籤",
"🍀 吉",
"🌿 小吉",
"🌤 平",
"🌧 小凶",
"⚡ 凶"
];

const colors=[
"#ffe0ec",
"#ffd6e7",
"#ffe9b3",
"#d6f5d6",
"#d6e6ff",
"#ffd1d1",
"#e0e0ff"
];

const wheel=document.getElementById("wheel");

let size=results.length;
let angle=360/size;
let rotation=0;
let spinning=false;

/* 建立真正轉盤（conic-gradient改為固定對齊） */
function buildWheel(){

let gradient="conic-gradient(";

for(let i=0;i<size;i++){
let start=i*angle;
let end=(i+1)*angle;

gradient+=`${colors[i]} ${start}deg ${end}deg`;

if(i<size-1) gradient+=",";
}

gradient+=")";

wheel.style.background=gradient;

}

buildWheel();

/* ⭐ 核心修正：完全對齊 pointer */
function spin(){

if(spinning) return;
spinning=true;

let index=Math.floor(Math.random()*size);

/* 👉 關鍵：pointer 在 12 點 = -90deg */
let pointerOffset = -90;

/* 👉 讓「扇形中心」對準 pointer */
let target =
360*5
- (index*angle + angle/2)
+ pointerOffset;

rotation+=target;

wheel.style.transform=`rotate(${rotation}deg)`;

setTimeout(()=>{

document.getElementById("result").innerText =
"今日運勢："+results[index];

spinning=false;

},4000);

}

</script>

</body>
</html>
