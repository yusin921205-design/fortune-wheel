<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>運勢輪盤</title>

<style>

body{
  font-family:Arial;
  text-align:center;
  background:#fff7fb;
  padding:40px;
}

h1{
  color:#ff4f8b;
}

.container{
  position:relative;
  width:320px;
  height:320px;
  margin:40px auto;
}

/* 轉盤 */
.wheel{
  width:100%;
  height:100%;
  border-radius:50%;
  position:absolute;
  transition:transform 4s cubic-bezier(.2,.8,.2,1);
  background: conic-gradient(
    #ffe0ec 0deg 51deg,
    #ffd6e7 51deg 102deg,
    #ffe9b3 102deg 153deg,
    #d6f5d6 153deg 204deg,
    #d6e6ff 204deg 255deg,
    #ffd1d1 255deg 306deg,
    #e0e0ff 306deg 360deg
  );
}

/* ⭐ 字也要跟著轉（重點） */
.labels{
  position:absolute;
  width:100%;
  height:100%;
  z-index:2;
  pointer-events:none;
  transition:transform 4s cubic-bezier(.2,.8,.2,1);
}

/* 單一文字 */
.label{
  position:absolute;
  left:50%;
  top:50%;
  font-size:14px;
  font-weight:bold;
  color:#333;
  white-space:nowrap;
}

/* ⭐ 指針（真正圓心） */
.pointer{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:0;
  height:0;
  z-index:10;
}

/* 圓心點 */
.pointer::before{
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  background:#ff4f8b;
  border-radius:50%;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
}

/* 箭頭從圓心往上 */
.pointer::after{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-100%);
  width:0;
  height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-bottom:25px solid #ff4f8b;
}

button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#ff4f8b;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.result{
  margin-top:20px;
  font-size:22px;
}

</style>
</head>

<body>

<h1>🎰 運勢輪盤</h1>

<div class="container">
  <div class="wheel" id="wheel"></div>
  <div class="labels" id="labels"></div>
  <div class="pointer"></div>
</div>

<button onclick="spin()">開始轉運 🍀</button>

<div class="result" id="result">點擊開始</div>

<script>

const results = [
"🌟 上上籤",
"✨ 上籤",
"🍀 吉",
"🌿 小吉",
"🌤 平",
"🌧 小凶",
"⚡ 凶"
];

const wheel = document.getElementById("wheel");
const labels = document.getElementById("labels");

let size = results.length;
let angle = 360 / size;

let rotation = 0;
let spinning = false;

/* ✔ 文字貼扇形 */
for(let i = 0; i < size; i++){

  let deg = i * angle + angle / 2;

  let div = document.createElement("div");
  div.className = "label";
  div.innerText = results[i];

  div.style.transform =
    `rotate(${deg}deg) translate(110px)`;

  labels.appendChild(div);
}

/* ✔ 反推 index（穩定） */
function getIndex(rot){
  let normalized = (rot % 360 + 360) % 360;
  let adjusted = (normalized + angle / 2) % 360;
  return Math.floor(adjusted / angle);
}

/* ✔ 轉動 */
function spin(){

if(spinning) return;
spinning = true;

let spins = 5 * 360;

/* ⭐ wheel 跟 labels 一起轉（關鍵修正） */
rotation += spins + Math.floor(Math.random() * 360);

wheel.style.transform = `rotate(${rotation}deg)`;

/* ⭐ 字跟著轉（不會漂） */
labels.style.transform = `rotate(${rotation}deg)`;

setTimeout(()=>{

let index = getIndex(rotation);

document.getElementById("result").innerText =
"純屬好玩，祝福你今天有美好的一天";

spinning = false;

},4000);

}

</script>

</body>
</html>
