<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>運勢轉盤 PRO</title>

<style>

body{
  font-family:Arial;
  text-align:center;
  background:#fff7fb;
  padding:40px;
}

h1{
  color:#ff4f8b;
}

.container{
  position:relative;
  width:320px;
  height:320px;
  margin:40px auto;
}

/* 轉盤 */
.wheel{
  width:100%;
  height:100%;
  border-radius:50%;
  position:absolute;
  transition:transform 4s cubic-bezier(.17,.67,.12,.99);
  background: conic-gradient(
    #ffe0ec 0deg 51deg,
    #ffd6e7 51deg 102deg,
    #ffe9b3 102deg 153deg,
    #d6f5d6 153deg 204deg,
    #d6e6ff 204deg 255deg,
    #ffd1d1 255deg 306deg,
    #e0e0ff 306deg 360deg
  );
}

/* 文字（固定不動，只跟著旋轉） */
.labels{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  pointer-events:none;
}

.label{
  position:absolute;
  left:50%;
  top:50%;
  transform-origin:0 0;
  font-size:14px;
  font-weight:bold;
}

/* 指針（固定在上方） */
.pointer{
  position:absolute;
  left:50%;
  top:-10px;
  transform:translateX(-50%);
  width:0;
  height:0;
  border-left:12px solid transparent;
  border-right:12px solid transparent;
  border-bottom:20px solid #ff4f8b;
  z-index:10;
}

/* 按鈕 */
button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#ff4f8b;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.result{
  margin-top:20px;
  font-size:22px;
}

</style>
</head>

<body>

<h1>🎰 運勢轉盤 PRO</h1>

<div class="container">

  <div class="wheel" id="wheel">
    <div class="labels" id="labels"></div>
  </div>

  <div class="pointer"></div>

</div>

<button onclick="spin()">開始轉運 🍀</button>

<div class="result" id="result">點擊開始</div>

<script>

const results = [
"🌟 上上籤",
"✨ 上籤",
"🍀 吉",
"🌿 小吉",
"🌤 平",
"🌧 小凶",
"⚡ 凶"
];

const wheel = document.getElementById("wheel");
const labels = document.getElementById("labels");

let size = results.length;
let angle = 360 / size;
let rotation = 0;
let spinning = false;

/* 建立文字 */
for(let i=0;i<size;i++){
  let div = document.createElement("div");
  div.className = "label";
  div.innerText = results[i];

  div.style.transform =
    `rotate(${i * angle}deg) translate(0,-120px)`;

  labels.appendChild(div);
}

/* 轉動 */
function spin(){

if(spinning) return;
spinning = true;

let index = Math.floor(Math.random() * size);

/* ⭐ 核心正確公式（不需要 -90） */
let target =
360 * 5 +
(360 - index * angle - angle/2);

rotation = target;

wheel.style.transform = `rotate(${rotation}deg)`;

setTimeout(()=>{

document.getElementById("result").innerText =
"今日運勢：" + results[index];

spinning = false;

},4000);

}

</script>

</body>
</html>
