<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>今日運勢轉盤</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#fff7fb;
  padding:40px;
}

h1{
  color:#ff4f8b;
}

.container{
  position:relative;
  width:320px;
  height:320px;
  margin:40px auto;
}

/* ⭐ 指針修正（尖頭朝內） */
.pointer{
  width:0;
  height:0;

  border-left:15px solid transparent;
  border-right:15px solid transparent;

  /* 👉 尖頭往下（指向轉盤） */
  border-top:25px solid #ff4f8b;

  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%, -140%);
  z-index:10;
}

/* ⭐ 轉盤 */
.wheel{
  width:320px;
  height:320px;
  border-radius:50%;
  background:conic-gradient(
    #ffe0ec 0deg 51deg,
    #ffd6e7 51deg 102deg,
    #ffe9b3 102deg 153deg,
    #d6f5d6 153deg 204deg,
    #d6e6ff 204deg 255deg,
    #ffd1d1 255deg 306deg,
    #e0e0ff 306deg 360deg
  );
  transition: transform 3s cubic-bezier(.2,.8,.2,1);
}

/* ⭐ 文字層（你缺的就是這個） */
.labels{
  position:absolute;
  width:320px;
  height:320px;
  top:0;
  left:0;
  pointer-events:none;
}

.label{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  font-size:13px;
  font-weight:bold;
  color:#333;
}

/* 按鈕 */
button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#ff4f8b;
  color:white;
  font-size:16px;
}

.result{
  margin-top:20px;
  font-size:22px;
}
</style>
</head>

<body>

<h1>🎰 今日運勢轉盤</h1>

<div class="container">

  <div class="pointer"></div>
  <div class="wheel" id="wheel"></div>

  <!-- ⭐ 文字層 -->
  <div class="labels" id="labels"></div>

</div>

<button onclick="spin()">開始轉運 🍀</button>

<div class="result" id="result">點擊開始</div>

<script>

const results = [
"🌟 上上籤",
"✨ 上籤",
"🍀 吉",
"🌿 小吉",
"🌤 平",
"🌧 小凶",
"⚡ 凶"
];

/* ⭐ 做文字定位 */
const labels = document.getElementById("labels");
const angle = 360 / results.length;

results.forEach((text, i) => {

let div = document.createElement("div");
div.className = "label";

div.style.transform = `
rotate(${i * angle + angle/2}deg)
translateY(-130px)
`;

div.innerHTML = text;

labels.appendChild(div);

});

let spinning = false;
let rotation = 0;

function spin(){

if(spinning) return;
spinning = true;

let index = Math.floor(Math.random() * results.length);
let slice = 360 / results.length;

let target = 360 * 3 - (index * slice + slice/2);

rotation += target;

document.getElementById("wheel").style.transform =
"rotate(" + rotation + "deg)";

setTimeout(() => {

document.getElementById("result").innerHTML =
"今日運勢：" + results[index];

spinning = false;

}, 3000);

}

</script>

</body>
</html>
