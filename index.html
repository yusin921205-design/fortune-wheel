<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>今日運勢轉盤</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#fff7fb;
  padding:40px;
}

h1{
  color:#ff4f8b;
}

.container{
  position:relative;
  width:320px;
  height:320px;
  margin:40px auto;
}

canvas{
  width:100%;
  height:100%;
}

/* 指針 */
.pointer{
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  width:0;
  height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-bottom:25px solid #ff4f8b;
  z-index:10;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#ff4f8b;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.result{
  margin-top:20px;
  font-size:22px;
}
</style>
</head>

<body>

<h1>🎰 今日運勢轉盤</h1>

<div class="container">
  <div class="pointer"></div>
  <canvas id="wheel" width="320" height="320"></canvas>
</div>

<button onclick="spin()">開始轉運 🍀</button>

<div class="result" id="result">點擊開始抽籤</div>

<script>

const results = [
"🌟 上上籤",
"✨ 上籤",
"🍀 吉",
"🌿 小吉",
"🌤 平",
"🌧 小凶",
"⚡ 凶"
];

const colors = [
"#ffe0ec","#ffd6e7","#ffe9b3",
"#d6f5d6","#d6e6ff","#ffd1d1","#e0e0ff"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const center = 160;
const radius = 150;
const angle = (2 * Math.PI) / results.length;

let rotation = 0;
let spinning = false;

/* 畫轉盤 */
function drawWheel(){

ctx.clearRect(0,0,320,320);

for(let i=0;i<results.length;i++){

let start = i * angle + rotation;

ctx.beginPath();
ctx.moveTo(center,center);
ctx.arc(center,center,radius,start,start+angle);
ctx.fillStyle = colors[i];
ctx.fill();
ctx.stroke();

ctx.save();
ctx.translate(center,center);
ctx.rotate(start + angle/2);
ctx.textAlign="right";
ctx.fillStyle="#333";
ctx.font="14px Arial";
ctx.fillText(results[i], radius-10, 5);
ctx.restore();

}

}

/* 初始畫面 */
drawWheel();

function spin(){

if(spinning) return;
spinning = true;

let target = Math.random() * 360 + 1080; // 多轉3圈
let start = rotation;
let duration = 3000;
let startTime = null;

function animate(time){

if(!startTime) startTime = time;

let progress = (time - startTime) / duration;

if(progress > 1) progress = 1;

rotation = start + (target - start) * easeOut(progress);

drawWheel();

if(progress < 1){
requestAnimationFrame(animate);
}else{

let index = Math.floor(
(results.length - (rotation % (2*Math.PI)) / angle) % results.length
);

document.getElementById("result").innerHTML =
"今日運勢：" + results[index];

spinning = false;
}

}

requestAnimationFrame(animate);

}

/* 減速動畫 */
function easeOut(t){
return 1 - Math.pow(1 - t, 3);
}

</script>

</body>
</html>
